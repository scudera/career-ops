# Portal Scanner Configuration — CI subset (committed, no secrets)
#
# This file is the curated subset used by the daily auto-cron scan in
# .github/workflows/scan-cron.yml. The full portals.yml lives outside the
# repo (gitignored, User Layer per DATA_CONTRACT.md). The CI runner picks
# this file up via CAREER_OPS_PORTALS=portals.ci.yml.
#
# Scope: 16 tenants validated post Frente B v2 (CP1–CP5 + STEAL 2/3/6).
#   - Workday: 9 tenants — direct API scan, no WebSearch, no LLM tokens.
#   - Gupy:    5 BR pharma tenants — PT-BR liveness fix applied (CP5).
#   - Phenom:  2 tenants — JSON-LD enrich opt-in (run cron WITHOUT
#              --phenom-enrich; work_mode/br_eligible resolved downstream
#              by pre-apply-check).
#
# Excluded by design (premise broken per COTSK-11 STEAL 3 smoke):
#   - Workable: 0/19 pharma slugs return jobs.
#   - SmartRecruiters: 0/30 pharma slugs return jobs.
#
# Title/location filters mirror portals.yml as of 2026-05-23.

# -- Title filter --

title_filter:
  positive:
    - "Regulatory Affairs"
    - "Regulatory Affairs Associate"
    - "Regulatory Affairs Specialist"
    - "Regulatory Associate"
    - "Regulatory Coordinator"
    - "Regulatory Manager"
    - "Regulatory Lead"
    - "Regulatory Strategy"
    - "Regulatory Intelligence"
    - "Regulatory Operations"
    - "Assuntos Regulatórios"
    - "Asuntos Regulatorios"
    - "Analista Regulatório"
    - "Analista Sênior Assuntos Regulatórios"
    - "Analista Pleno Assuntos Regulatórios"
    - "Especialista Assuntos Regulatórios"
    - "Especialista Regulatório"
    - "Coordenador Regulatório"
    - "Gerente Regulatório"
    - "Gerente de Assuntos Regulatórios"
    - "Líder Regulatório"
    - "Lifecycle Management"
    - "Post-Approval"
    - "Marketed Products Regulatory"
    - "Regulatory Affairs — Established Products"
    - "Labeling Regulatory"
    - "Product Maintenance"
    - "CMC Regulatory"
    - "Horizon Scanning"
  negative:
    - "Quality Assurance"
    - "Quality Control"
    - "Clinical Research"
    - "Clinical Operations"
    - "Medical Affairs"
    - "Pharmacovigilance"
    - "Medical Writing"
    - "Software"
    - "Developer"
    - "Engineer"
    - "Data Scientist"
    - "United States location"
    - "Estados Unidos (location)"
    - "USA-based"
    - "remote US"
    - "US remote"
    - "remote USA"
    - "(US)"
    - "US-based"
    - "Clinical Trial Submissions"
    - "CTA Submissions"
    - "DDCM"
    - "DEEC"
    - "Clinical Regulatory"
    - "Study Start-Up"
    - "IND Submissions"
    - "CT Submissions"

# -- Location filter --

location_filter:
  # Key MUST be `block:` (matches scan.mjs:165 buildLocationFilter). Earlier
  # convention used `blocked_patterns:` which buildLocationFilter never read,
  # silently rendering the filter inert. Fixed 2026-05-23 (COHO-21).
  block:
    - "United States"
    - "Remote - US"
    - "Remote, US"
    - "Remote (US)"
    - ", NY"
    - ", CA"
    - ", MA"
    - ", NJ"
    - ", PA"
    - ", TX"
    - ", IL"
    - ", WA"
    - "India"
    - "Remote - India"
    - "Hyderabad"
    - "Japan"
    - "Tokyo"
    - "Osaka"
    - "China"
    - "Beijing"
    - "Shanghai"
    - "Hong Kong"
    - "South Korea"
    - "Seoul"
    - "Taiwan"
    - "Taipei"
    - "Indonesia"
    - "Jakarta"
    - "Vietnam"
    - "Australia"
    - "Sydney"
    - "Melbourne"
    - "Singapore"
    - "Thailand"
    - "Egypt"
    - "Cairo"
    - "United Arab Emirates"
    - "Dubai"
    - "Canada"
    - "Toronto"
    - "Mexico"
    - ", MD"
    - ", NC"
    - ", GA"
    - ", VA"
    - ", CO"
    - ", MN"
    - ", OH"
    - ", CT"
    - ", FL"
    - ", AZ"

